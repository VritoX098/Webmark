<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e8e6e1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .header-actions button {
      background: none;
      border: 1px solid #d9d5cd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      transition: background 0.1s;
    }

    .header-actions button:hover {
      background: #f0ede8;
    }

    .search-bar {
      padding: 10px 18px;
      border-bottom: 1px solid #e8e6e1;
      flex-shrink: 0;
    }

    .search-bar input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d9d5cd;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus {
      border-color: #b0a890;
    }

    .highlights-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .highlights-list::-webkit-scrollbar { width: 4px; }
    .highlights-list::-webkit-scrollbar-thumb { background: #d4d0c8; border-radius: 2px; }

    .site-group {
      padding: 0 18px;
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 0 4px;
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .site-header img {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .highlight-card {
      position: relative;
      padding: 10px 12px;
      margin: 4px 0;
      background: #fff;
      border: 1px solid #ebe8e2;
      border-radius: 8px;
      border-left: 3px solid var(--accent-color, #F5CE6E);
      cursor: default;
      transition: box-shadow 0.1s;
    }

    .highlight-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .highlight-text {
      font-size: 13px;
      line-height: 1.5;
      color: #2a2a2a;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .highlight-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #aaa;
    }

    .highlight-meta a {
      color: #999;
      text-decoration: none;
    }
    .highlight-meta a:hover { text-decoration: underline; }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      transition: color 0.1s;
    }
    .delete-btn:hover { color: #e55; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 30px;
      text-align: center;
      color: #aaa;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.5; }

    .count-badge {
      background: #f0ede8;
      color: #888;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Webmarks <span class="count-badge" id="count">0</span></h1>
    <div class="header-actions">
      <button id="exportBtn">Export</button>
      <button id="clearBtn">Clear all</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search highlights…">
  </div>
  <div class="highlights-list" id="list"></div>

  <script src="popup.js"></script>
</body>
</html>
